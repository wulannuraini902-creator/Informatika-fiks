<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Task App</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <h1>🚀 Space Task Manager</h1>
  <button onclick="openModal()">+ Add Task</button>
</header>

<section id="overallProgressContainer">
  <h3>Overall Progress</h3>
  <div class="progress-bar">
    <div id="overallProgress"></div>
  </div>
</section>

<main id="taskContainer"></main>
<div id="taskModal" class="modal">
  <div class="modal-content">
    <h2>Tambah Mata Pelajaran</h2>

    <input type="text" id="subjectName" placeholder="Nama Mata Pelajaran">

    <input type="date" id="deadline">

    <select id="emoji">
      <option>📚</option>
      <option>✏️</option>
      <option>🔬</option>
      <option>🧮</option>
      <option>🌍</option>
      <option>🎨</option>
    </select>

    <input type="color" id="colorPicker" value="#a0d8ef">

    <div class="button-group">
      <button onclick="addSubject()">Simpan</button>
      <button onclick="closeModal()">Batal</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
